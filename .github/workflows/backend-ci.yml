name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x backend/mvnw

      - name: Run unit tests
        working-directory: backend
        run: ./mvnw -B -DskipTests=false clean test

      - name: Build backend artifact
        working-directory: backend
        run: ./mvnw -B -DskipTests=false clean package

      - name: Build Docker image for backend
        run: docker build -f backend/Dockerfile -t backend-ci:latest backend
